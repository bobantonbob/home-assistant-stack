markiza_stop:
  alias: Маркіза — стоп
  mode: restart
  sequence:
    - action: scene.turn_on
      target:
        entity_id: scene.markiza_zupiniti


markiza_lower_full:
  alias: Маркіза — повністю опустити
  mode: restart

  sequence:
    - variables:
        current_position: "{{ states('input_select.markiza_position') }}"

        remaining_time: >
          {% set t1 = states('input_number.markiza_time_level_1') | float(8.3) %}
          {% set t2 = states('input_number.markiza_time_level_2') | float(8.3) %}
          {% set t3 = states('input_number.markiza_time_level_3') | float(8.4) %}

          {% if current_position == 'ПІДНЯТА' %}
            {{ t1 + t2 + t3 }}
          {% elif current_position == '1/3' %}
            {{ t2 + t3 }}
          {% elif current_position == '2/3' %}
            {{ t3 }}
          {% elif current_position == 'FULL' %}
            {{ 0 }}
          {% else %}
            {{ t1 + t2 + t3 }}
          {% endif %}

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ current_position == 'FULL' }}"
          sequence:
            - stop: Маркіза вже повністю опущена

    - action: scene.turn_on
      target:
        entity_id: scene.markiza_opustiti

    - delay:
        seconds: "{{ remaining_time | float(0) }}"

    - action: scene.turn_on
      target:
        entity_id: scene.markiza_zupiniti

    - action: input_select.select_option
      target:
        entity_id: input_select.markiza_position
      data:
        option: "FULL"

markiza_raise_full:
  alias: Маркіза — повністю підняти
  mode: restart
  sequence:
    - action: scene.turn_on
      target:
        entity_id: scene.markiza_pidniati

    - delay:
        seconds: >
          {{ states('input_number.markiza_full_travel_time') | float(25) }}

    - action: scene.turn_on
      target:
        entity_id: scene.markiza_zupiniti

    - action: input_select.select_option
      target:
        entity_id: input_select.markiza_position
      data:
        option: "ПІДНЯТА"


markiza_next_level:
  alias: Маркіза — наступне положення
  description: ПІДНЯТА → 1/3 → 2/3 → FULL → ПІДНЯТА
  mode: single

  sequence:
    - variables:
        current_position: "{{ states('input_select.markiza_position') }}"

    - choose:
        # ПІДНЯТА → 1/3
        - conditions:
            - condition: template
              value_template: "{{ current_position == 'ПІДНЯТА' }}"
          sequence:
            - action: scene.turn_on
              target:
                entity_id: scene.markiza_opustiti

            - delay:
                seconds: >
                  {{ states('input_number.markiza_time_level_1') | float(8.3) }}

            - action: scene.turn_on
              target:
                entity_id: scene.markiza_zupiniti

            - action: input_select.select_option
              target:
                entity_id: input_select.markiza_position
              data:
                option: "1/3"

        # 1/3 → 2/3
        - conditions:
            - condition: template
              value_template: "{{ current_position == '1/3' }}"
          sequence:
            - action: scene.turn_on
              target:
                entity_id: scene.markiza_opustiti

            - delay:
                seconds: >
                  {{ states('input_number.markiza_time_level_2') | float(8.3) }}

            - action: scene.turn_on
              target:
                entity_id: scene.markiza_zupiniti

            - action: input_select.select_option
              target:
                entity_id: input_select.markiza_position
              data:
                option: "2/3"

        # 2/3 → FULL
        - conditions:
            - condition: template
              value_template: "{{ current_position == '2/3' }}"
          sequence:
            - action: scene.turn_on
              target:
                entity_id: scene.markiza_opustiti

            - delay:
                seconds: >
                  {{ states('input_number.markiza_time_level_3') | float(8.4) }}

            - action: scene.turn_on
              target:
                entity_id: scene.markiza_zupiniti

            - action: input_select.select_option
              target:
                entity_id: input_select.markiza_position
              data:
                option: "FULL"

        # FULL → повністю підняти
        - conditions:
            - condition: template
              value_template: "{{ current_position == 'FULL' }}"
          sequence:
            - action: scene.turn_on
              target:
                entity_id: scene.markiza_pidniati

            - delay:
                seconds: >
                  {{ states('input_number.markiza_full_travel_time') | float(25) }}

            - action: scene.turn_on
              target:
                entity_id: scene.markiza_zupiniti

            - action: input_select.select_option
              target:
                entity_id: input_select.markiza_position
              data:
                option: "ПІДНЯТА"

      default:
        # Якщо стан загубився — повністю підняти для синхронізації
        - action: scene.turn_on
          target:
            entity_id: scene.markiza_pidniati

        - delay:
            seconds: >
              {{ states('input_number.markiza_full_travel_time') | float(25) }}

        - action: scene.turn_on
          target:
            entity_id: scene.markiza_zupiniti

        - action: input_select.select_option
          target:
            entity_id: input_select.markiza_position
          data:
            option: "ПІДНЯТА"
