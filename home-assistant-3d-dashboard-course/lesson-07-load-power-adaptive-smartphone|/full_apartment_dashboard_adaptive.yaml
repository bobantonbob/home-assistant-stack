                      }

                      return 'rgba(0,0,0,0.45)';
                    ]]]
                - border-radius: 50%
                - width: clamp(38px, 5.5vw, 56px)
                - height: clamp(38px, 5.5vw, 56px)
                - padding: clamp(2px, 0.7vw, 4px)
                - box-shadow: |
                    [[[
                      if (entity.state === 'on') {
                        return '0 0 clamp(10px, 2vw, 24px) rgba(255,215,0,0.95)';
                      }

                      return '0 0 clamp(4px, 1vw, 8px) rgba(0,0,0,0.6)';
                    ]]]
                - border: |
                    [[[
                      if (entity.state === 'on') {
                        return '2px solid rgba(255,215,0,0.85)';
                      }

                      return '1px solid rgba(255,255,255,0.15)';
                    ]]]
              icon:
                - width: clamp(18px, 3vw, 30px)
                - color: |
                    [[[
                      return entity.state === 'on'
                        ? '#FFD700'
                        : 'gray';
                    ]]]
              state:
                - color: white
                - font-size: clamp(7px, 1.3vw, 10px)
                - font-weight: bold
            style:
              top: 92%
              left: 48%
          - type: custom:button-card
            entity: sensor.kholodilnik_power
            icon: mdi:fridge-outline
            show_icon: true
            show_name: false
            show_state: true
            state_display: |
              [[[
                return Math.round(Number(entity.state)) + ' W';
              ]]]
            styles:
              card:
                - background: |
                    [[[
                      const sw = states['switch.kholodilnik_switch_1'];
                      if (sw && sw.state === 'off') return 'rgba(40,40,40,0.55)';
                      return 'rgba(0,0,0,0.60)';
                    ]]]
                - border-radius: clamp(9px, 1.5vw, 14px)
                - padding: 4px
