type: panel
path: home
title: Home
icon: mdi:home-assistant
cards:
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: |-
        minmax(0, min(calc(100vw - 460px), calc(100vh - 120px))) minmax(300px,
        420px)
      grid-template-areas: |
        "left right"
      gap: 12px
      justify-content: center
      align-items: start
      mediaquery:
        "(max-width: 900px)":
          grid-template-columns: 1fr
          grid-template-areas: |
            "left"
            "right"
    cards:
      - type: picture-elements
        view_layout:
          grid-area: left
        image: /local/home11.png
        aspect_ratio: 1/1
        elements:
          - type: image
            entity: camera.network_video_recorder_channel_3
            camera_image: camera.network_video_recorder_channel_3
            camera_view: live
            tap_action:
              action: more-info
            style:
              left: 85%
              top: 35%
              transform: translate(-50%, -50%)
              width: clamp(80px, 12vw, 150px)
              border-radius: clamp(8px, 1vw, 14px)
              overflow: hidden
              border: 1px solid rgba(0, 229, 255, 0.85)
              box-shadow: 0 0 16px rgba(0, 229, 255, 0.55)
              z-index: 30
          - type: custom:button-card
            entity: sensor.smart_plug_power_2
            icon: mdi:desktop-tower-monitor
            show_name: false
            show_state: true
            state_display: |
              [[[
                return Math.round(Number(entity.state)) + ' W';
              ]]]
            styles:
              card:
                - background: rgba(0,0,0,0.60)
                - border-radius: clamp(9px, 1.5vw, 14px)
                - padding: clamp(2px, 0.8vw, 4px)
                - width: clamp(42px, 5.5vw, 58px)
                - height: clamp(46px, 6vw, 62px)
                - box-shadow: 0 0 clamp(7px, 1.5vw, 14px) rgba(0,255,255,0.55)
              grid:
                - grid-template-areas: |
                    "i"
                    "s"
                - grid-template-columns: 1fr
                - grid-template-rows: auto auto
              icon:
                - color: cyan
                - width: clamp(14px, 2vw, 18px)
                - justify-self: center
              state:
                - color: cyan
                - font-size: clamp(8px, 1.6vw, 11px)
                - font-weight: bold
                - justify-self: center
            style:
              top: 15%
              left: 9%
          - type: custom:button-card
            entity: switch.wifi_breaker_t_switch_1
            icon: mdi:led-strip-variant
            show_name: false
            show_state: true
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            state_display: |
              [[[
                return entity.state === 'on' ? 'ON' : 'OFF';
              ]]]
            styles:
              card:
                - background: |
                    [[[
                      if (entity.state === 'on') {
                        return 'radial-gradient(circle, rgba(255,215,0,0.35), rgba(0,0,0,0.65))';
                      }

                      return 'rgba(0,0,0,0.45)';
                    ]]]
                - border-radius: 50%
                - width: clamp(38px, 5.5vw, 56px)
                - height: clamp(38px, 5.5vw, 56px)
                - padding: clamp(2px, 0.7vw, 4px)
                - box-shadow: |
                    [[[
                      if (entity.state === 'on') {
                        return '0 0 clamp(10px, 2vw, 24px) rgba(255,215,0,0.95)';
                      }

                      return '0 0 clamp(4px, 1vw, 8px) rgba(0,0,0,0.6)';
                    ]]]
                - border: |
                    [[[
                      if (entity.state === 'on') {
                        return '2px solid rgba(255,215,0,0.85)';
                      }

                      return '1px solid rgba(255,255,255,0.15)';
                    ]]]
              icon:
                - width: clamp(18px, 3vw, 30px)
                - color: |
                    [[[
                      return entity.state === 'on'
                        ? '#FFD700'
                        : 'gray';
                    ]]]
              state:
                - color: white
                - font-size: clamp(7px, 1.3vw, 10px)
                - font-weight: bold
            style:
              top: 49%
              left: 96%
          - type: custom:button-card
            entity: sensor.deye_load_power
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            hold_action:
              action: none
            custom_fields:
              inverter: |
                [[[
                  const p = states['sensor.deye_load_power'];
                  const value = p && !['unknown','unavailable'].includes(p.state)
                    ? Math.round(Number(p.state)) + ' W'
                    : 'OFF';

                  return `
                    <div class="power-row inverter-row">
                      <ha-icon icon="mdi:flash"></ha-icon>
                      <span class="label">НАВАНТАЖЕННЯ</span>
                      <span class="value">${value}</span>
                    </div>
                  `;
                ]]]
              apartment: |
                [[[
                  const p = states['sensor.ups_power'];
                  const value = p && !['unknown','unavailable'].includes(p.state)
                    ? Math.round(Number(p.state)) + ' W'
                    : 'OFF';

                  return `
                    <div class="power-row apartment-row">
                      <ha-icon icon="mdi:home-lightning-bolt"></ha-icon>
                      <span class="label">КВАРТИРА</span>
                      <span class="value">${value}</span>
                    </div>
                  `;
                ]]]
              parents: |
                [[[
                  const p = states['sensor.batki_ups_power'];
                  const value = p && !['unknown','unavailable'].includes(p.state)
                    ? Math.round(Number(p.state)) + ' W'
                    : 'OFF';

                  return `
                    <div class="power-row parents-row">
                      <ha-icon icon="mdi:home-heart"></ha-icon>
                      <span class="label">БАТЬКИ</span>
                      <span class="value">${value}</span>
                    </div>
                  `;
                ]]]
              boiler: |
                [[[
                  const p = states['sensor.asic_a3_sonoff_1000241bb9_power'];
                  const value = p && !['unknown','unavailable'].includes(p.state)
                    ? Math.round(Number(p.state)) + ' W'
                    : 'OFF';

                  return `
                    <div class="power-row boiler-row">
                      <ha-icon icon="mdi:server-network"></ha-icon>
                      <span class="label">СЕРВЕРНА</span>
                      <span class="value">${value}</span>
                    </div>
                  `;
                ]]]
            styles:
              card:
                - background: |
                    [[[
                      const inverter = Number(states['sensor.deye_load_power']?.state || 0);
                      const apartment = Number(states['sensor.ups_power']?.state || 0);
                      const parents = Number(states['sensor.batki_ups_power']?.state || 0);
                      const boiler = Number(states['sensor.asic_a3_sonoff_1000241bb9_power']?.state || 0);
                      const total = inverter;

                      if (total > 1800) {
                        return 'radial-gradient(circle, rgba(255,140,0,0.28), rgba(0,0,0,0.78))';
                      }

                      if (total > 600) {
                        return 'radial-gradient(circle, rgba(0,255,255,0.22), rgba(0,0,0,0.72))';
                      }

                      return 'rgba(0,0,0,0.55)';
                    ]]]
                - border-radius: clamp(10px, 2vw, 20px)
                - padding: clamp(5px, 1vw, 10px)
                - width: clamp(160px, 20vw, 255px)
                - height: clamp(96px, 13vw, 145px)
                - box-sizing: border-box
                - overflow: visible
                - border: 1px solid rgba(0,255,255,0.35)
                - box-shadow: |
                    [[[
                      const inverter = Number(states['sensor.deye_load_power']?.state || 0);
                      const total = inverter;

                      if (total > 1800) {
                        return '0 0 clamp(10px, 2vw, 26px) rgba(255,140,0,0.90)';
                      }

                      if (total > 600) {
                        return '0 0 clamp(8px, 1.8vw, 22px) rgba(0,255,255,0.75)';
                      }

                      return '0 0 clamp(4px, 1vw, 10px) rgba(0,255,255,0.35)';
                    ]]]
              grid:
                - grid-template-areas: |
                    "inverter"
                    "apartment"
                    "parents"
                    "boiler"
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr 1fr 1fr 1fr
                - row-gap: clamp(3px, 0.6vw, 6px)
              custom_fields:
                inverter:
                  - align-self: center
                apartment:
                  - align-self: center
                parents:
                  - align-self: center
                boiler:
                  - align-self: center
            extra_styles: |
              .power-row {
                display: grid;
                grid-template-columns: clamp(14px, 2vw, 22px) minmax(0, 1fr) max-content;
                align-items: center;
                column-gap: clamp(4px, 0.7vw, 8px);
                width: 100%;
                height: clamp(19px, 2.6vw, 30px);
                padding: 0 clamp(8px, 1vw, 12px) 0 clamp(5px, 0.8vw, 8px);
                border-radius: clamp(6px, 1vw, 12px);
                background: rgba(255,255,255,0.04);
                box-sizing: border-box;
                overflow: hidden;
              }

              .power-row ha-icon {
                width: clamp(13px, 1.9vw, 21px);
                height: clamp(13px, 1.9vw, 21px);
                min-width: clamp(13px, 1.9vw, 21px);
              }

              .label {
                color: rgba(255,255,255,0.78);
                font-size: clamp(6px, 0.82vw, 10px);
                font-weight: 800;
                letter-spacing: 0.2px;
                text-align: left;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                min-width: 0;
              }

              .value {
                font-size: clamp(9px, 1.25vw, 18px);
                font-weight: 900;
                white-space: nowrap;
                text-align: right;
                padding-right: clamp(2px, 0.4vw, 6px);
              }

              .inverter-row ha-icon,
              .inverter-row .value {
                color: #ffea00;
              }

              .apartment-row ha-icon,
              .apartment-row .value {
                color: #00ffff;
              }

              .parents-row ha-icon,
              .parents-row .value {
                color: #00ff9d;
              }

              .boiler-row ha-icon,
              .boiler-row .value {
                color: #ffb347;
              }
            style:
              top: 11%
              left: 83%
              transform: translate(-50%, -50%)
          - type: custom:button-card
            entity: binary_sensor.192_168_1_143
            icon: mdi:shield-lock
            name: ПІД ОХОРОНОЮ
