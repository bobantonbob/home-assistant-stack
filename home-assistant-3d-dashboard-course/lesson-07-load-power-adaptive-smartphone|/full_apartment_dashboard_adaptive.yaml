                      const sw = states['switch.kholodilnik_switch_1'];
                      if (sw && sw.state === 'off') return '0 0 clamp(4px, 1vw, 8px) rgba(80,80,80,0.35)';
                      return '0 0 clamp(7px, 1.5vw, 14px) rgba(0,255,255,0.55)';
                    ]]]
              grid:
                - grid-template-areas: |
                    "i s"
                - grid-template-columns: 18px auto
                - grid-template-rows: 1fr
                - column-gap: 6px
                - align-items: center
                - justify-content: center
              icon:
                - color: |
                    [[[
                      const sw = states['switch.kholodilnik_switch_1'];
                      if (sw && sw.state === 'off') return 'gray';
                      return 'cyan';
                    ]]]
                - width: 18px
              state:
                - color: |
                    [[[
                      const sw = states['switch.kholodilnik_switch_1'];
                      if (sw && sw.state === 'off') return 'gray';
                      return 'cyan';
                    ]]]
                - font-size: clamp(8px, 1.5vw, 11px)
