            styles:
              card:
                - display: |
                    [[[
                      return entity.state === 'off' ? 'flex' : 'none';
                    ]]]
                - background: rgba(120, 0, 0, 0.82)
                - border: 2px solid rgba(255, 60, 60, 0.95)
                - border-radius: clamp(14px, 2vw, 26px)
                - padding: clamp(10px, 2vw, 22px)
                - width: clamp(190px, 32vw, 420px)
                - height: clamp(70px, 10vw, 120px)
                - box-shadow: 0 0 clamp(18px, 4vw, 45px) rgba(255, 0, 0, 0.95)
                - animation: blink-security 1.4s infinite
              grid:
                - grid-template-areas: "\"i n\""
                - grid-template-columns: auto 1fr
                - align-items: center
                - justify-content: center
                - column-gap: clamp(8px, 1.5vw, 18px)
              icon:
                - color: "#ff3333"
                - width: clamp(30px, 5vw, 58px)
              name:
                - color: white
                - font-size: clamp(18px, 3.2vw, 42px)
                - font-weight: 900
                - letter-spacing: 1px
                - text-shadow: 0 0 10px rgba(255,0,0,0.9)
            extra_styles: |
              @keyframes blink-security {
                0% {
                  filter: brightness(1);
                  transform: scale(1);
                }
                50% {
                  filter: brightness(1.35);
                  transform: scale(1.03);
                }
                100% {
                  filter: brightness(1);
                  transform: scale(1);
                }
              }
            style:
              top: 50%
              left: 50%
              z-index: 999
          - type: custom:button-card
            entity: switch.wifi_breaker_t_2_switch_1
            icon: mdi:led-strip-variant
            show_name: false
            show_state: true
            tap_action:
