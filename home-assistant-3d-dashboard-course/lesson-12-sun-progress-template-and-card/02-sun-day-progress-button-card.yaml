      - type: custom:button-card
        entity: sensor.sun_day_progress
        show_name: false
        show_state: false
        show_icon: false
        tap_action:
          action: more-info
        style:
          left: 50%
          top: 84%
          width: 88%
          transform: translate(-50%, -50%)
          z-index: 15
        custom_fields:
          track: ""
          passed: ""
          sun: |
            [[[
              return '☀';
            ]]]
          value: |
            [[[
              const p = Number(states['sensor.sun_day_progress']?.state || 0);
              return `${Math.round(p)}%`;
            ]]]
        styles:
          card:
            - position: relative
            - height: clamp(34px, 4vw, 44px)
            - background: rgba(0, 0, 0, 0.18)
            - border-radius: 999px
            - box-shadow: none
            - border: none
            - padding: 0
            - overflow: visible
          custom_fields:
            track:
              - position: absolute
              - left: 4%
              - top: 50%
              - width: 92%
              - height: 4px
              - transform: translateY(-50%)
              - background: >-
                  linear-gradient(90deg, rgba(255,213,79,0.10),
                  rgba(255,213,79,0.35), rgba(255,213,79,0.10))
              - border-radius: 999px
              - box-shadow: 0 0 8px rgba(255,213,79,0.25)
              - z-index: 1
            passed:
              - position: absolute
              - right: 4%
              - top: 50%
              - width: |
                  [[[
                    const p = Math.max(0, Math.min(100, Number(states['sensor.sun_day_progress']?.state || 0)));
                    return `${p * 0.92}%`;
                  ]]]
              - height: 8px
              - transform: translateY(-50%)
              - background: >-
                  linear-gradient(270deg, rgba(255,245,150,1),
                  rgba(255,213,79,0.85), rgba(255,213,79,0.20))
              - border-radius: 999px
              - box-shadow: 0 0 18px rgba(255,213,79,0.95)
              - z-index: 2
            sun:
              - position: absolute
              - top: 50%
              - left: |
                  [[[
                    const p = Math.max(0, Math.min(100, Number(states['sensor.sun_day_progress']?.state || 0)));
                    const reversed = 100 - p;
                    return `calc(4% + ${reversed * 0.92}% - 13px)`;
                  ]]]
              - transform: translateY(-50%)
              - font-size: clamp(18px, 2vw, 26px)
              - color: "#ffd54f"
              - filter: drop-shadow(0 0 10px rgba(255,213,79,1))
              - z-index: 3
            value:
              - position: absolute
              - right: 2%
              - top: "-2px"
              - font-size: clamp(9px, 1vw, 12px)
              - font-weight: 800
              - color: "#ffd54f"
              - text-shadow: 0 0 8px rgba(255,213,79,0.9)
              - z-index: 4
