
type: custom:button-card
entity: switch.wifi_breaker_t_2_switch_1
icon: mdi:led-strip-variant
show_name: false
show_state: true
tap_action:
  action: toggle
hold_action:
  action: more-info
state_display: |
  [[[
    return entity.state === 'on' ? 'ON' : 'OFF';
  ]]]
styles:
  card:
    - background: |
        [[[
          if (entity.state === 'on') {
            return 'radial-gradient(circle, rgba(255,215,0,0.35), rgba(0,0,0,0.65))';
          }
          return 'rgba(0,0,0,0.55)';
        ]]]
    - border-radius: 12px
    - width: 50px
    - height: 58px
    - padding: 4px
    - box-shadow: |
        [[[
          if (entity.state === 'on') {
            return '0 0 20px rgba(255,215,0,0.90)';
          }
          return '0 0 10px rgba(0,255,255,0.35)';
        ]]]
    - border: |
        [[[
          if (entity.state === 'on') {
            return '1px solid rgba(255,215,0,0.85)';
          }
          return '1px solid rgba(0,255,255,0.30)';
        ]]]
  grid:
    - grid-template-areas: |
        "i"
        "s"
    - grid-template-columns: 1fr
    - grid-template-rows: auto auto
  icon:
    - color: |
        [[[
          return entity.state === 'on' ? '#FFD700' : 'cyan';
        ]]]
    - width: 23px
    - justify-self: center
  state:
    - color: white
    - font-size: 10px
    - font-weight: bold
    - justify-self: center
style:
  top: 92%
  left: 53%
  transform: translate(-50%, -50%)
  z-index: 35
