# =============================================================================
# ОСНОВНИЙ 3D DASHBOARD HOME ASSISTANT
# Авторський повний код дашборду
#
# Це мій основний робочий дашборд Home Assistant, який збирався протягом
# усього курсу. У файлі вже об'єднані всі основні картки, елементи керування,
# анімації, камери, сонячна генерація, Tesla, клімат, освітлення, маркіза,
# прогноз Solcast та інші блоки.
#
# АДАПТАЦІЯ:
# - комп'ютери та великі екрани;
# - планшети;
# - смартфони.
#
# ВАЖЛИВО:
# - це готовий приклад мого особистого дашборду;
# - замініть entity_id на власні сутності;
# - замініть локальні зображення та SVG-файли у /local/;
# - за потреби змініть координати елементів під власний 3D-план;
# - код надається як є для самостійної адаптації.
#
# Основні залежності:
# - custom:layout-card
# - custom:grid-layout
# - custom:button-card
# - card-mod
# =============================================================================

type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr)
  grid-template-areas: |
    "apartment roof"
  gap: clamp(6px, 1vw, 12px)
  justify-content: center
  align-items: start
  mediaquery:
    "(max-width: 900px)":
      grid-template-columns: 1fr
      grid-template-areas: |
        "apartment"
        "roof"
      gap: 4px
cards:
  - type: picture-elements
    view_layout:
      grid-area: roof
    image:
      media_content_id: /local/roof.png
    card_mod:
      style: |
        ha-card {
          width: min(100%, calc(100dvh - 115px));
          height: min(100%, calc(100dvh - 115px));
          max-width: 100%;
          margin: 0 auto;
          overflow: hidden;
          background: transparent;
          box-shadow: none;
        }

        @media (max-width: 900px) {
          ha-card {
            width: min(100vw, calc((100dvh - 130px) / 2));
            height: min(100vw, calc((100dvh - 130px) / 2));
          }
        }
    elements:
      - type: custom:button-card
        entity: sensor.pidval_temperature
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: more-info
        hold_action:
          action: none
        custom_fields:
          temp: |
            [[[
              const t = states['sensor.pidval_temperature'];
              const value = t && !['unknown','unavailable'].includes(t.state)
                ? Math.round(Number(t.state)) + '°'
                : '--°';

              return `
                <div class="smoke-temp-wrap">
                  <div class="temp-value">${value}</div>
                </div>
              `;
            ]]]
        styles:
          card:
            - width: clamp(42px, 5vw, 56px)
            - height: clamp(42px, 5vw, 56px)
            - border-radius: 50%
            - padding: 0
            - box-sizing: border-box
            - overflow: hidden
            - background: |
                [[[
                  const smoke = states['binary_sensor.pidval_dim_smoke']?.state === 'on';

                  if (smoke) {
                    return 'radial-gradient(circle, rgba(255,0,0,0.85), rgba(80,0,0,0.90))';
                  }

                  return 'radial-gradient(circle, rgba(0,0,0,0.62), rgba(0,0,0,0.38))';
                ]]]
            - border: |
                [[[
                  const smoke = states['binary_sensor.pidval_dim_smoke']?.state === 'on';

                  if (smoke) {
                    return '2px solid rgba(255,0,0,0.95)';
                  }

                  return '1px solid rgba(0,229,255,0.55)';
                ]]]
            - box-shadow: |
                [[[
                  const smoke = states['binary_sensor.pidval_dim_smoke']?.state === 'on';

                  if (smoke) {
                    return '0 0 22px rgba(255,0,0,0.95), inset 0 0 16px rgba(255,80,80,0.55)';
                  }

                  return '0 0 14px rgba(0,229,255,0.40), inset 0 0 12px rgba(0,229,255,0.16)';
                ]]]
            - animation: |
                [[[
                  const smoke = states['binary_sensor.pidval_dim_smoke']?.state === 'on';
                  return smoke ? 'smokePulse 1s infinite' : 'none';
                ]]]                
          grid:
            - grid-template-areas: "\"temp\""
            - grid-template-columns: 1fr
            - grid-template-rows: 1fr
          custom_fields:
            temp:
              - align-self: center
              - justify-self: center
        extra_styles: |
          .smoke-temp-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
          }

          .temp-value {
            font-size: clamp(12px, 1.5vw, 17px);
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.85);
          }

          .temp-label {
            margin-top: 4px;
            font-size: clamp(6px, 0.75vw, 9px);
            font-weight: 800;
            color: rgba(255,255,255,0.75);
            letter-spacing: 0.5px;
          }

          @keyframes smokePulse {
            0% {
              box-shadow: 0 0 14px rgba(255,0,0,0.65), inset 0 0 12px rgba(255,0,0,0.45);
            }
            50% {
              box-shadow: 0 0 30px rgba(255,0,0,1), inset 0 0 22px rgba(255,80,80,0.85);
            }
            100% {
              box-shadow: 0 0 14px rgba(255,0,0,0.65), inset 0 0 12px rgba(255,0,0,0.45);
            }
          }
        style:
          left: 93%
          top: 65%
          transform: translate(-50%, -50%)
          z-index: 80
      - type: icon
        entity: camera.ipcamera_profile_000
        icon: mdi:cctv
        tap_action:
          action: more-info
        hold_action:
          action: none
        style:
          left: 93%
          top: 75%
          transform: translate(-50%, -50%)
          color: "#00f5ff"
          background: rgba(0, 0, 0, 0.68)
          border: 1px solid rgba(0, 229, 255, 0.85)
          box-shadow: 0 0 clamp(6px, 1.5vw, 16px) rgba(0, 229, 255, 0.55)
          border-radius: clamp(7px, 1vw, 14px)
          padding: clamp(4px, 0.9vw, 10px)
          z-index: 50
          "--mdc-icon-size": clamp(14px, 2.4vw, 24px)
      - type: custom:button-card
        entity: sensor.total_solar_power
        name: ВСЬОГО
        icon: mdi:solar-power-variant
        show_name: true
        show_state: true
        show_icon: true
        tap_action:
          action: more-info
        custom_fields:
          pv_border: ""
        state_display: |
          [[[
            const v = Number(entity.state);
            if (isNaN(v)) return '0 W';

            if (v >= 1000) {
              return (v / 1000).toFixed(2) + ' kW';
            }

            return Math.round(v) + ' W';
          ]]]
        style:
          left: 47%
          top: 66%
          transform: translate(-50%, -50%)
          width: max-content
          z-index: 25
        extra_styles: |
          @keyframes totalPvPulse {
            0% {
              box-shadow:
                0 0 0 0 rgba(255, 210, 70, 0.55),
                0 0 12px rgba(255, 210, 70, 0.35);
            }
            50% {
              box-shadow:
                0 0 0 10px rgba(255, 210, 70, 0.08),
                0 0 28px rgba(255, 210, 70, 0.85);
            }
            100% {
              box-shadow:
                0 0 0 0 rgba(255, 210, 70, 0),
                0 0 12px rgba(255, 210, 70, 0.35);
            }
          }
        styles:
          grid:
            - grid-template-areas: "\"i n\" \"i s\""
            - grid-template-columns: min-content max-content
            - grid-template-rows: min-content min-content
            - column-gap: clamp(6px, 0.9vw, 10px)
            - position: relative
            - z-index: 3
          card:
            - width: max-content
            - min-width: 0
            - position: relative
            - overflow: visible
            - background: |
                [[[
                  const v = Number(entity.state);
                  if (v > 10) return 'rgba(48, 36, 4, 0.76)';
                  return 'rgba(0, 0, 0, 0.58)';
                ]]]
            - border-radius: clamp(13px, 1.2vw, 18px)
            - padding: clamp(6px, 0.9vw, 10px) clamp(9px, 1.1vw, 14px)
            - border: none
            - animation: |
                [[[
                  const v = Number(entity.state);
                  if (v > 10) return 'totalPvPulse 1.8s ease-in-out infinite';
                  return 'none';
                ]]]
          custom_fields:
            pv_border:
              - position: absolute
              - inset: "-6px"
              - border-radius: clamp(13px, 1.2vw, 18px)
              - padding: 3px
              - z-index: 1
              - pointer-events: none
              - background: |
                  [[[
                    const v = Number(entity.state);
                    const max = 8400;
                    const percent = Math.min(Math.max(v / max * 100, 0), 100);

                    if (v <= 10) {
                      return `
                        conic-gradient(
                          from -90deg,
                          rgba(160,160,160,0.35) 0%,
                          rgba(160,160,160,0.35) 100%
                        )
                      `;
                    }

                    return `
                      conic-gradient(
                        from -90deg,
                        rgba(255, 213, 79, 1) 0%,
                        rgba(255, 213, 79, 1) ${percent}%,
                        rgba(255, 255, 255, 0.14) ${percent}%,
                        rgba(255, 255, 255, 0.14) 100%
                      )
                    `;
                  ]]]
              - "-webkit-mask": >-
                  linear-gradient(#000 0 0) content-box, linear-gradient(#000 0
                  0)
              - "-webkit-mask-composite": xor
              - mask-composite: exclude
          icon:
            - position: relative
            - z-index: 3
            - color: |
                [[[
                  const v = Number(entity.state);
                  return v > 10 ? '#ffd54f' : 'rgba(170,170,170,0.65)';
                ]]]
            - filter: |
                [[[
                  const v = Number(entity.state);
                  return v > 10
                    ? 'drop-shadow(0 0 7px rgba(255, 213, 79, 0.95))'
                    : 'none';
                ]]]
            - width: clamp(22px, 2.8vw, 36px)
            - justify-self: center
            - align-self: center
          name:
            - position: relative
            - z-index: 3
            - color: |
                [[[
                  const v = Number(entity.state);
                  return v > 10 ? '#ffd54f' : 'rgba(190,190,190,0.65)';
                ]]]
            - text-shadow: |
                [[[
                  const v = Number(entity.state);
                  return v > 10
                    ? '0 0 6px rgba(255, 213, 79, 0.85)'
                    : 'none';
                ]]]
            - font-size: clamp(10px, 1.15vw, 15px)
            - font-weight: 800
            - letter-spacing: 0.4px
            - justify-self: start
            - align-self: end
            - line-height: 1
            - white-space: nowrap
          state:
            - position: relative
            - z-index: 3
            - color: |
                [[[
                  const v = Number(entity.state);
                  return v > 10 ? '#ffd54f' : 'rgba(210,210,210,0.70)';
                ]]]
            - text-shadow: |
                [[[
                  const v = Number(entity.state);
                  return v > 10
                    ? '0 0 8px rgba(255, 213, 79, 0.95)'
                    : 'none';
                ]]]
            - font-size: clamp(15px, 2vw, 28px)
            - font-weight: 900
            - justify-self: start
            - align-self: start
            - line-height: 1
            - white-space: nowrap
        card_mod:
          style: |
            :host {
              width: max-content !important;
            }

            ha-card {
              width: max-content !important;
            }
      - type: custom:button-card
        entity: sensor.live_clock_seconds
        show_icon: true
        show_name: true
        show_state: true
        icon: mdi:clock-outline
        name: |
          [[[
            const days = [
              'Неділя',
              'Понеділок',
              'Вівторок',
              'Середа',
              'Четвер',
              'Пʼятниця',
              'Субота'
            ];

            const months = [
              'січня',
              'лютого',
              'березня',
              'квітня',
              'травня',
              'червня',
              'липня',
              'серпня',
              'вересня',
              'жовтня',
              'листопада',
              'грудня'
            ];

            const now = new Date();
            const dayName = days[now.getDay()];
            const day = now.getDate();
            const month = months[now.getMonth()];

            return `${dayName}, ${day} ${month}`;
          ]]]
        state_display: |
          [[[
            return entity.state;
          ]]]
        tap_action:
          action: none
        style:
          left: 18%
          top: 7%
          transform: translate(-50%, -50%)
          width: max-content
          z-index: 20
        styles:
          grid:
            - grid-template-areas: "\"i s\" \"i n\""
            - grid-template-columns: min-content max-content
            - grid-template-rows: min-content min-content
            - column-gap: clamp(6px, 0.8vw, 10px)
            - row-gap: 1px
          card:
            - width: max-content
            - min-width: 0
            - background: rgba(0, 0, 0, 0.62)
            - border-radius: clamp(10px, 1vw, 16px)
            - padding: clamp(5px, 0.8vw, 9px) clamp(8px, 1vw, 12px)
            - border: 1px solid rgba(255,255,255,0.18)
            - box-shadow: 0 0 12px rgba(0,0,0,0.45)
            - box-sizing: border-box
            - overflow: visible
          icon:
            - color: "#ffd54f"
            - width: clamp(18px, 2.2vw, 28px)
            - justify-self: center
            - align-self: center
          state:
            - color: "#ffd54f"
            - font-size: clamp(14px, 1.8vw, 24px)
            - font-weight: 900
            - justify-self: start
            - align-self: end
            - line-height: 1
            - white-space: nowrap
            - font-variant-numeric: tabular-nums
          name:
            - color: white
            - font-size: clamp(8px, 1vw, 13px)
            - font-weight: 600
            - justify-self: start
            - align-self: start
            - line-height: 1
            - white-space: nowrap
        card_mod:
          style: |
            :host {
              width: max-content !important;
            }

            ha-card {
              width: max-content !important;
            }
      - type: custom:button-card
        entity: sensor.sun_day_progress
        show_name: false
        show_state: false
        show_icon: false
        tap_action:
          action: more-info
        style:
          left: 50%
          top: 84%
          width: 88%
          transform: translate(-50%, -50%)
          z-index: 15
        custom_fields:
          track: ""
          passed: ""
          sun: |
            [[[
              return '☀';
            ]]]
          value: |
            [[[
              const p = Number(states['sensor.sun_day_progress']?.state || 0);
              return `${Math.round(p)}%`;
            ]]]
        styles:
          card:
            - position: relative
            - height: clamp(34px, 4vw, 44px)
            - background: rgba(0, 0, 0, 0.18)
            - border-radius: 999px
            - box-shadow: none
            - border: none
            - padding: 0
            - overflow: visible
          custom_fields:
            track:
              - position: absolute
              - left: 4%
              - top: 50%
              - width: 92%
              - height: 4px
              - transform: translateY(-50%)
              - background: >-
                  linear-gradient(90deg, rgba(255,213,79,0.10),
                  rgba(255,213,79,0.35), rgba(255,213,79,0.10))
              - border-radius: 999px
              - box-shadow: 0 0 8px rgba(255,213,79,0.25)
              - z-index: 1
            passed:
              - position: absolute
              - right: 4%
              - top: 50%
              - width: |
                  [[[
                    const p = Math.max(0, Math.min(100, Number(states['sensor.sun_day_progress']?.state || 0)));
                    return `${p * 0.92}%`;
                  ]]]
              - height: 8px
              - transform: translateY(-50%)
              - background: >-
                  linear-gradient(270deg, rgba(255,245,150,1),
                  rgba(255,213,79,0.85), rgba(255,213,79,0.20))
              - border-radius: 999px
              - box-shadow: 0 0 18px rgba(255,213,79,0.95)
              - z-index: 2
            sun:
              - position: absolute
              - top: 50%
              - left: |
                  [[[
                    const p = Math.max(0, Math.min(100, Number(states['sensor.sun_day_progress']?.state || 0)));
                    const reversed = 100 - p;
                    return `calc(4% + ${reversed * 0.92}% - 13px)`;
                  ]]]
              - transform: translateY(-50%)
              - font-size: clamp(18px, 2vw, 26px)
              - color: "#ffd54f"
              - filter: drop-shadow(0 0 10px rgba(255,213,79,1))
              - z-index: 3
            value:
              - position: absolute
              - right: 2%
              - top: "-2px"
              - font-size: clamp(9px, 1vw, 12px)
              - font-weight: 800
              - color: "#ffd54f"
              - text-shadow: 0 0 8px rgba(255,213,79,0.9)
              - z-index: 4
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.sun_day_progress
            above: 0
            below: 100.1
        elements:
          - type: image
            image: /local/animated_roof_strings_overlay.svg
            style:
              left: 50%
              top: 50%
              width: 100%
              transform: translate(-50%, -50%)
              pointer-events: none
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.sun_day_progress
            above: 0
            below: 100.1
          - entity: switch.sonoff4_ha_sonoff_1000066f8f_1
            state: "on"
        elements:
          - type: image
            image: /local/animated_roof_microinverters_overlay_v2.svg
            style:
              left: 50%
              top: 50%
              width: 100%
              transform: translate(-50%, -50%)
              pointer-events: none
      - type: image
        entity: camera.network_video_recorder_channel_2
        camera_image: camera.network_video_recorder_channel_2
        camera_view: live
        tap_action:
          action: more-info
        style:
          left: 84%
          top: 48%
          transform: translate(-50%, -50%)
          width: clamp(110px, 18vw, 220px)
          border-radius: clamp(8px, 1vw, 14px)
          overflow: hidden
          border: 1px solid rgba(0, 229, 255, 0.85)
          box-shadow: 0 0 16px rgba(0, 229, 255, 0.55)
      - type: custom:button-card
        entity: sensor.solcast_pv_forecast_forecast_today
        name: СЬОГОДНІ
        icon: mdi:white-balance-sunny
        show_name: true
        show_state: true
        show_icon: true
        tap_action:
          action: more-info
        state_display: |
          [[[
            const v = Number(entity.state);
            if (isNaN(v)) return '0.0 kWh';
            return v.toFixed(1) + ' kWh';
          ]]]
        style:
          left: 11%
          top: 93%
          transform: translate(-50%, -50%)
          width: clamp(70px, 11vw, 120px)
          z-index: 40
        styles:
          grid:
            - grid-template-areas: "\"i\" \"s\" \"n\""
            - grid-template-columns: 1fr
            - grid-template-rows: min-content min-content min-content
          card:
            - background: rgba(45, 32, 4, 0.72)
            - border-radius: clamp(10px, 1vw, 14px)
            - padding: clamp(4px, 0.8vw, 8px)
            - border: 1px solid rgba(255, 210, 70, 0.85)
            - box-shadow: 0 0 12px rgba(255, 210, 70, 0.35)
            - box-sizing: border-box
            - overflow: hidden
          icon:
            - color: "#ffd54f"
            - width: clamp(18px, 2.2vw, 26px)
            - justify-self: center
          state:
            - color: "#ffd54f"
            - font-size: clamp(10px, 1.25vw, 15px)
            - font-weight: 800
            - justify-self: center
            - line-height: 1
          name:
            - color: white
            - font-size: clamp(7px, 0.9vw, 11px)
            - font-weight: 600
            - justify-self: center
            - line-height: 1
        card_mod:
          style: |
            :host {
              display: block !important;
            }

            @media (max-width: 1366px) {
              :host {
                display: none !important;
              }
            }
      - type: custom:button-card
        entity: sensor.solcast_pv_forecast_forecast_today
        icon: mdi:white-balance-sunny
        show_name: false
        show_state: true
        show_icon: true
        tap_action:
          action: more-info
        state_display: |
          [[[
            const v = Number(entity.state);
            if (isNaN(v)) return '0.0';
            return v.toFixed(1);
          ]]]
        style:
          left: 11%
          top: 93%
          transform: translate(-50%, -50%)
          width: clamp(38px, 5vw, 58px)
          z-index: 41
        styles:
          grid:
            - grid-template-areas: "\"i\" \"s\""
            - grid-template-columns: 1fr
            - grid-template-rows: min-content min-content
            - row-gap: 1px
          card:
            - background: rgba(45, 32, 4, 0.68)
            - border-radius: clamp(7px, 0.8vw, 10px)
            - padding: clamp(2px, 0.35vw, 4px)
            - border: 1px solid rgba(255, 210, 70, 0.85)
            - box-shadow: 0 0 8px rgba(255, 210, 70, 0.35)
            - box-sizing: border-box
            - overflow: hidden
          icon:
            - color: "#ffd54f"
            - width: clamp(13px, 1.7vw, 18px)
            - justify-self: center
          state:
            - color: "#ffd54f"
            - font-size: clamp(8px, 1.2vw, 11px)
            - font-weight: 900
            - justify-self: center
            - line-height: 1
        card_mod:
          style: |
            :host {
              display: none !important;
            }

            @media (max-width: 1366px) {
              :host {
                display: block !important;
              }
            }
      - type: custom:button-card
        entity: sensor.solcast_pv_forecast_forecast_tomorrow
        name: ЗАВТРА
        icon: mdi:weather-sunny
        show_name: true
        show_state: true
        show_icon: true
        tap_action:
          action: more-info
        state_display: |
          [[[
            const v = Number(entity.state);
            if (isNaN(v)) return '0.0 kWh';
            return v.toFixed(1) + ' kWh';
          ]]]
        style:
          left: 23.3%
          top: 93%
          transform: translate(-50%, -50%)
          width: clamp(70px, 11vw, 120px)
          z-index: 40
        styles:
          grid:
            - grid-template-areas: "\"i\" \"s\" \"n\""
            - grid-template-columns: 1fr
            - grid-template-rows: min-content min-content min-content
          card:
            - background: rgba(0,0,0,0.62)
            - border-radius: clamp(10px, 1vw, 14px)
            - padding: clamp(4px, 0.8vw, 8px)
