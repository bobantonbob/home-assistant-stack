  - type: custom:button-card
    entity: switch.tesla_switch
    icon: mdi:car-electric
    show_name: false
    show_state: true
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    state_display: |
      [[[
        const p = states['sensor.anma_charger_power_2'];

        if (p && !['unknown','unavailable'].includes(p.state)) {
          return Number(p.state).toFixed(2) + ' kW';
        }

        return entity.state === 'on' ? 'ON' : 'OFF';
      ]]]
    styles:
      card:
        - background: |
            [[[
              if (entity.state === 'on') {
                return 'radial-gradient(circle, rgba(0,255,120,0.45), rgba(0,0,0,0.70))';
              }

              return 'rgba(0,0,0,0.45)';
            ]]]
        - border-radius: 50%
        - width: clamp(42px, 6vw, 60px)
        - height: clamp(42px, 6vw, 60px)
        - padding: clamp(2px, 0.7vw, 4px)
        - box-shadow: |
            [[[
              if (entity.state === 'on') {
                return '0 0 clamp(10px, 2.5vw, 28px) rgba(0,255,120,0.95)';
              }

              return '0 0 clamp(4px, 1vw, 8px) rgba(0,0,0,0.6)';
            ]]]
        - border: |
            [[[
              if (entity.state === 'on') {
                return '2px solid rgba(0,255,120,0.9)';
              }

              return '1px solid rgba(255,255,255,0.15)';
            ]]]
      icon:
        - width: clamp(20px, 3.4vw, 34px)
        - color: |
            [[[
              return entity.state === 'on'
                ? '#00ff78'
                : 'gray';
            ]]]
      state:
        - color: white
        - font-size: clamp(7px, 1.3vw, 10px)
        - font-weight: bold
    style:
      top: 93%
      left: 29%
