  - type: custom:button-card
    entity: sensor.anma_battery_level
    icon: mdi:battery-high
    show_name: false
    show_state: true
    state_display: |
      [[[
        if (entity.state && !['unknown','unavailable'].includes(entity.state)) {
          return Math.round(Number(entity.state)) + '%';
        }
        return '--%';
      ]]]
    styles:
      card:
        - background: rgba(0,0,0,0.45)
        - border-radius: clamp(10px, 1.8vw, 18px)
        - width: clamp(52px, 7vw, 78px)
        - height: clamp(34px, 4.8vw, 46px)
        - padding: clamp(2px, 0.7vw, 4px)
        - box-shadow: 0 0 clamp(8px, 2vw, 18px) rgba(0,255,255,0.65)
        - border: 1px solid rgba(0,255,255,0.55)
      icon:
        - width: clamp(14px, 2.4vw, 24px)
        - color: "#00ffff"
      state:
        - color: "#00ffff"
        - font-size: clamp(9px, 1.7vw, 14px)
        - font-weight: bold
    style:
      top: 89%
      left: 20%
