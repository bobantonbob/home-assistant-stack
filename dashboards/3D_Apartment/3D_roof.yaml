type: picture-elements
image:
  media_content_id: /local/roof.png
card_mod:
  style: |
    ha-card {
      width: min(100vw, calc(100dvh - 90px));
      height: min(100vw, calc(100dvh - 90px));
      margin: 0 auto;
      overflow: hidden;
      background: transparent;
      box-shadow: none;
    }
elements:
  - type: custom:button-card
    entity: sensor.sun_day_progress
    show_name: false
    show_state: false
    show_icon: false
    tap_action:
      action: more-info
    style:
      left: 50%
      top: 84%
      width: 88%
      transform: translate(-50%, -50%)
    custom_fields:
      track: ""
      sun: |
        [[[
          return '☀';
        ]]]
      value: |
        [[[
          const p = Number(states['sensor.sun_day_progress']?.state || 0);
          return `${Math.round(p)}%`;
        ]]]
    styles:
      card:
        - position: relative
        - height: clamp(34px, 4vw, 44px)
        - background: rgba(0, 0, 0, 0.18)
        - border-radius: 999px
        - box-shadow: none
        - border: none
        - padding: 0
      custom_fields:
        track:
          - position: absolute
          - left: 4%
          - top: 50%
          - width: 92%
          - height: 4px
          - transform: translateY(-50%)
          - background: >-
              linear-gradient(90deg, rgba(255,213,79,0.18),
              rgba(255,213,79,0.55), rgba(255,213,79,0.18))
          - border-radius: 999px
          - box-shadow: 0 0 8px rgba(255,213,79,0.35)
        sun:
          - position: absolute
          - top: 50%
          - left: |
              [[[
                const p = Math.max(0, Math.min(100, Number(states['sensor.sun_day_progress']?.state || 0)));
                return `calc(4% + ${p * 0.92}% - 14px)`;
              ]]]
          - transform: translateY(-50%)
          - font-size: clamp(18px, 2vw, 26px)
          - color: "#ffd54f"
          - filter: drop-shadow(0 0 8px rgba(255,213,79,0.95))
        value:
          - position: absolute
          - right: 2%
          - top: "-2px"
          - font-size: clamp(9px, 1vw, 12px)
          - font-weight: 700
          - color: "#ffd54f"
  - type: image
    image: /local/animated_roof_strings_overlay.svg
    style:
      left: 50%
      top: 50%
      width: 100%
      transform: translate(-50%, -50%)
      pointer-events: none
  - type: conditional
    conditions:
      - entity: switch.sonoff4_ha_sonoff_1000066f8f_1
        state: "on"
    elements:
      - type: image
        image: /local/animated_roof_microinverters_overlay_v2.svg
        style:
          left: 50%
          top: 50%
          width: 100%
          transform: translate(-50%, -50%)
          pointer-events: none
  - type: image
    entity: camera.network_video_recorder_channel_2
    camera_image: camera.network_video_recorder_channel_2
    camera_view: live
    tap_action:
      action: more-info
    style:
      left: 84%
      top: 48%
      transform: translate(-50%, -50%)
      width: clamp(110px, 18vw, 220px)
      border-radius: clamp(8px, 1vw, 14px)
      overflow: hidden
