        return 'OFF';
      ]]]
    tap_action:
      action: more-info
    styles:
      card:
        - background: |
            [[[
              const p = Number(entity.state);

              if (p > 1200)
                return 'radial-gradient(circle, rgba(0,255,255,0.30), rgba(0,0,0,0.78))';

              if (p > 300)
                return 'rgba(0,0,0,0.60)';

              return 'rgba(0,0,0,0.38)';
