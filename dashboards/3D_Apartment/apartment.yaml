type: grid
cards:
  - type: picture-elements
    image: /local/HA_home11.png
    aspect_ratio: 1/1
    card_mod:
      style: |
        ha-card {
          width: 1000px;
          max-width: 1000px;
        }
    elements:
      - type: state-label
        entity: sensor.kholodilnik_power
        style:
          top: 73%
          left: 91%
          color: white
          background: rgba(0,0,0,0.6)
          padding: 4px 8px
          border-radius: 10px
          font-size: 14px
      - type: state-label
        entity: sensor.boiler_power
        style:
          top: 8%
          left: 60%
          color: white
          background: rgba(0,0,0,0.6)
          padding: 4px 8px
          border-radius: 10px
          font-size: 14px
      - type: state-label
        entity: sensor.kompiuter_power
        style:
          top: 87%
          left: 40%
          color: cyan
          background: rgba(0,0,0,0.6)
          padding: 4px 8px
          border-radius: 10px
          font-size: 14px
      - type: state-icon
        entity: climate.floor_heating
        style:
          top: 90%
          left: 53%
          color: orange
      - type: state-label
        entity: climate.floor_heating
        attribute: current_temperature
        suffix: °C
        style:
          top: 82%
          left: 53%
          color: white
          background: rgba(0,0,0,0.6)
          padding: 4px 8px
          border-radius: 10px
          font-size: 14px
      - type: custom:button-card
        entity: light.dimmer_kukhnia
        icon: mdi:led-strip-variant
        show_name: false
        show_state: true
        tap_action:
          action: toggle
        hold_action:
          action: more-info
        styles:
          card:
            - background: rgba(0,0,0,0.4)
            - border-radius: 50%
            - width: 60px
            - height: 60px
            - padding: 4px
          icon:
            - color: |
                [[[
                  return entity.state == 'on'
                    ? 'yellow'
                    : 'gray';
                ]]]
          state:
            - color: white
            - font-size: 11px
        state_display: |
          [[[
            if (entity.state == 'on') {
              return Math.round(entity.attributes.brightness / 2.55) + '%';
            }
            return 'Вимк.';
          ]]]
        style:
          top: 58%
          left: 82%
      - type: custom:button-card
        entity: input_boolean.lamps_eva_virtual
        icon: mdi:lightbulb
        show_name: false
        show_state: true
        tap_action:
          action: toggle
        styles:
          card:
            - background: rgba(0,0,0,0.4)
            - border-radius: 50%
            - width: 70px
            - height: 70px
            - padding: 4px
          icon:
            - color: |
                [[[
                  return entity.state == 'on'
                    ? 'yellow'
                    : 'gray';
                ]]]
          state:
            - color: white
            - font-size: 12px
            - font-weight: bold
        state_display: |
          [[[
            return states['input_number.lamps_eva_brightness'].state + '%';
          ]]]
        style:
          top: 24%
          left: 21%
column_span: 1
