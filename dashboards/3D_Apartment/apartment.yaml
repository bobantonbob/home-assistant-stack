type: picture-elements
image: /local/HA_home11.png
aspect_ratio: 1/1
card_mod:
  style: |
    ha-card {
      width: 1000px;
      max-width: 1000px;
    }
elements:
  - type: state-label
    entity: sensor.kholodilnik_power
    style:
      top: 73%
      left: 91%
      color: cyan
      background: rgba(0,0,0,0.6)
      padding: 4px 8px
      border-radius: 10px
      font-size: 14px
  - type: state-label
    entity: sensor.boiler_power
    style:
      top: 8%
      left: 60%
      color: cyan
      background: rgba(0,0,0,0.6)
      padding: 4px 8px
      border-radius: 10px
      font-size: 14px
  - type: state-label
    entity: sensor.kompiuter_power
    style:
      top: 87%
      left: 40%
      color: cyan
      background: rgba(0,0,0,0.6)
      padding: 4px 8px
      border-radius: 10px
      font-size: 14px
  - type: custom:button-card
    entity: climate.floor_heating
    icon: mdi:radiator
    show_name: false
    show_state: true
    tap_action:
      action: toggle
    state_display: |
      [[[
        return entity.attributes.current_temperature + '°C';
      ]]]
    styles:
      card:
        - background: |
            [[[
              if (entity.attributes.hvac_action === 'heating') {
                return 'rgba(255,165,0,0.65)';
              }
              return 'rgba(0,0,0,0.5)';
            ]]]
        - border-radius: 18px
        - width: 80px
        - height: 80px
      icon:
        - color: |
            [[[
              const action = entity.attributes.hvac_action;
              const state = entity.state;

              if (action === 'heating' || action === 'heat' || action === 'running') {
                return '#ff0000';
              }

              if (state !== 'off') {
                return 'orange';
              }

              return 'gray';
            ]]]
      state:
        - color: white
        - font-size: 16px
    style:
      top: 86%
      left: 53%
  - type: custom:button-card
    entity: climate.floor_heating
    icon: mdi:circle
    show_name: false
    show_state: false
    tap_action:
      action: none
    styles:
      card:
        - background: none
        - box-shadow: none
        - width: 20px
        - height: 20px
      icon:
        - width: 14px
        - color: |
            [[[
              const current = Number(entity.attributes.current_temperature);
              const target = Number(entity.attributes.temperature);

              if (entity.state !== 'off' && target > current) {
                return '#ff0000';
              }

              return 'transparent';
            ]]]
    style:
      top: 84%
      left: 56%
  - type: custom:button-card
    entity: light.dimmer_kukhnia
    icon: mdi:led-strip-variant
    show_name: false
    show_state: true
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    styles:
      card:
        - background: rgba(0,0,0,0.4)
        - border-radius: 50%
        - width: 60px
        - height: 60px
        - padding: 4px
      icon:
        - color: |
            [[[
              if (entity.attributes.hvac_action === 'heating') {
                return '#ff0000';
              }

              if (entity.state !== 'off') {
                return 'orange';
              }

              return 'gray';
            ]]]
      state:
        - color: white
        - font-size: 11px
    state_display: |
      [[[
        if (entity.state == 'on') {
          return Math.round(entity.attributes.brightness / 2.55) + '%';
        }
        return 'Вимк.';
      ]]]
    style:
      top: 58%
      left: 82%
  - type: custom:button-card
    entity: input_boolean.lamps_eva_virtual
    icon: mdi:lightbulb
    show_name: false
    show_state: true
    tap_action:
      action: toggle
    styles:
      card:
        - background: rgba(0,0,0,0.4)
        - border-radius: 50%
        - width: 70px
        - height: 70px
        - padding: 4px
      icon:
        - color: |
            [[[
              return entity.state == 'on'
                ? 'yellow'
                : 'gray';
            ]]]
      state:
        - color: white
        - font-size: 12px
        - font-weight: bold
    state_display: |
      [[[
        return states['input_number.lamps_eva_brightness'].state + '%';
      ]]]
    style:
      top: 24%
      left: 21%
