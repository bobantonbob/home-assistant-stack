              const p = Number(entity.state);

              if (p > 1000)
                return '0 0 clamp(10px, 2vw, 22px) rgba(0,255,255,0.95)';

              return '0 0 clamp(4px, 1.2vw, 10px) rgba(0,255,255,0.35)';
