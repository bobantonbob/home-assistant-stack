type: picture-elements
image: /local/HA_home11_1.png
aspect_ratio: 1/1
elements:
  - type: custom:button-card
    entity: sensor.kholodilnik_power
    icon: mdi:fridge-outline
    show_name: false
    show_state: true
    state_display: |
      [[[
        return Math.round(Number(entity.state)) + ' W';
      ]]]
    styles:
      card:
        - background: rgba(0,0,0,0.60)
        - border-radius: clamp(9px, 1.5vw, 14px)
        - padding: clamp(2px, 0.8vw, 4px)
        - width: clamp(42px, 5.5vw, 58px)
        - height: clamp(46px, 6vw, 62px)
        - box-shadow: 0 0 clamp(7px, 1.5vw, 14px) rgba(0,255,255,0.55)
      grid:
        - grid-template-areas: |
            "i"
            "s"
        - grid-template-columns: 1fr
        - grid-template-rows: auto auto
      icon:
        - color: cyan
        - width: clamp(14px, 2vw, 18px)
        - justify-self: center
      state:
        - color: cyan
        - font-size: clamp(8px, 1.6vw, 11px)
        - font-weight: bold
        - justify-self: center
    style:
      top: 74%
      left: 92%
