type: entities
show_header_toggle: false
entities:
  - type: custom:mushroom-number-card
    entity: input_number.lamps_eva_brightness
    name: Eva
    icon: mdi:lightbulb
    layout: horizontal
    display_mode: slider
    fill_container: true
    secondary: |
      {% if is_state('input_boolean.lamps_eva_virtual', 'on') %}
        {{ states('input_number.lamps_eva_brightness') | int }}%
      {% else %}
        Вимкнено
      {% endif %}
    tap_action:
      action: call-service
      service: input_boolean.toggle
      target:
        entity_id: input_boolean.lamps_eva_virtual
    icon_color: |
      {% if is_state('input_boolean.lamps_eva_virtual', 'on') %}
        amber
      {% else %}
        grey
      {% endif %}
    card_mod:
      style:
        mushroom-number-value-control$: |
          mushroom-slider {
            --main-color:
              {% if is_state('input_boolean.lamps_eva_virtual', 'on') %}
                rgb(255,152,0)
              {% else %}
                rgb(70,70,70)
              {% endif %} !important;

            --bg-color:
              {% if is_state('input_boolean.lamps_eva_virtual', 'on') %}
                rgba(255,152,0,0.28)
              {% else %}
                rgba(80,80,80,0.18)
              {% endif %} !important;
          }
        .: |
          .container {
            grid-template-columns: auto 66% !important;
          }

          ha-card {
            padding-top: 6px !important;
            padding-bottom: 6px !important;
          }

          mushroom-shape-icon {
            --icon-color:
              {% if is_state('input_boolean.lamps_eva_virtual', 'on') %}
                rgb(255,152,0)
              {% else %}
                rgb(180,180,180)
              {% endif %} !important;

            --shape-color:
              {% if is_state('input_boolean.lamps_eva_virtual', 'on') %}
                rgba(255,152,0,0.25)
              {% else %}
                rgba(80,80,80,0.35)
              {% endif %} !important;
          }
  - type: custom:mushroom-light-card
    entity: light.dimmer_kukhnia
    name: Яскравість кухні
    layout: horizontal
    show_brightness_control: true
    show_color_temp_control: false
    collapsible_controls: false
    card_mod:
      style: |
        ha-card {
          padding-top: 6px !important;
          padding-bottom: 6px !important;
        }
  - type: custom:mushroom-climate-card
    entity: climate.floor_heating
    name: Температура підлоги
    icon: mdi:thermometer
    layout: horizontal
    show_temperature_control: true
    collapsible_controls: false
    hvac_modes:
      - heat
      - "off"
    card_mod:
      style: |
        ha-card {
          padding-top: 6px !important;
          padding-bottom: 6px !important;
        }
  - type: custom:mushroom-template-card
    entity: switch.tesla_switch
    primary: Tesla Model 3
    secondary: |
      {{ states('sensor.anma_charger_power_2') }} kW
    icon: mdi:car-electric
    icon_color: |
      {% if is_state('switch.tesla_switch', 'on') %}
        green
      {% else %}
        grey
      {% endif %}
    tap_action:
      action: toggle
    hold_action:
      action: more-info
  - type: divider
  - entity: sensor.kotelnia_power
    name: Котельня
  - entity: sensor.batki_ups_power
    name: Батьки
  - entity: sensor.ups_power
    name: UPS
  - type: divider
  - entity: sensor.kompiuter_power
    name: Компʼютер
  - entity: sensor.boiler_power
    name: Бойлер
  - entity: sensor.kholodilnik_power
    name: Холодильник
